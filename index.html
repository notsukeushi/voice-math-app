<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こえでこたえる！さんすうアプリ</title>
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div class="container">
        <h1>🎙️ こえでこたえる！さんすう</h1>
        
        <div class="settings">
            <label><input type="radio" name="mode" value="add" checked> たしざん</label>
            <label><input type="radio" name="mode" value="sub"> ひきざん</label>
        </div>

        <div class="score-board">
            セット: <span id="question-count">1</span>/5 <br>
            せいかい: <span id="correct-count">0</span>
        </div>

        <div class="problem-container">
            <div class="problems-grid">
                <!-- もんだい 1 -->
                <div class="math-problem" id="prob-0">
                    <div class="prob-num">①</div>
                    <div class="number" id="num1-0">--</div>
                    <div class="operator-row">
                        <span id="operator-0">+</span>
                        <span class="number" id="num2-0">--</span>
                    </div>
                    <hr class="line">
                    <div class="number answer-box" id="answer-0">?</div>
                    <div class="prob-result" id="result-0"></div>
                </div>
                <!-- もんだい 2 -->
                <div class="math-problem" id="prob-1">
                    <div class="prob-num">②</div>
                    <div class="number" id="num1-1">--</div>
                    <div class="operator-row">
                        <span id="operator-1">+</span>
                        <span class="number" id="num2-1">--</span>
                    </div>
                    <hr class="line">
                    <div class="number answer-box" id="answer-1">?</div>
                    <div class="prob-result" id="result-1"></div>
                </div>
                <!-- もんだい 3 -->
                <div class="math-problem" id="prob-2">
                    <div class="prob-num">③</div>
                    <div class="number" id="num1-2">--</div>
                    <div class="operator-row">
                        <span id="operator-2">+</span>
                        <span class="number" id="num2-2">--</span>
                    </div>
                    <hr class="line">
                    <div class="number answer-box" id="answer-2">?</div>
                    <div class="prob-result" id="result-2"></div>
                </div>
                <!-- もんだい 4 -->
                <div class="math-problem" id="prob-3">
                    <div class="prob-num">④</div>
                    <div class="number" id="num1-3">--</div>
                    <div class="operator-row">
                        <span id="operator-3">+</span>
                        <span class="number" id="num2-3">--</span>
                    </div>
                    <hr class="line">
                    <div class="number answer-box" id="answer-3">?</div>
                    <div class="prob-result" id="result-3"></div>
                </div>
            </div>
        </div>

        <div id="keyboard-area" class="keyboard-area hidden">
            <div id="keyboard-question-label" class="keyboard-question-label">①のこたえは？</div>
            <div id="keyboard-display" class="keyboard-display">--</div>
            <div class="numpad">
                <button class="num-key" data-val="7">7</button>
                <button class="num-key" data-val="8">8</button>
                <button class="num-key" data-val="9">9</button>
                <button class="num-key" data-val="4">4</button>
                <button class="num-key" data-val="5">5</button>
                <button class="num-key" data-val="6">6</button>
                <button class="num-key" data-val="1">1</button>
                <button class="num-key" data-val="2">2</button>
                <button class="num-key" data-val="3">3</button>
                <button class="num-key del-key" data-val="del">⌫</button>
                <button class="num-key" data-val="0">0</button>
                <button class="num-key ok-key" data-val="ok">OK</button>
            </div>
        </div>

        <div class="controls">
            <button id="mic-btn" class="mic-btn">🎤 4つのこたえを言う</button>
            <button id="keyboard-btn" class="keyboard-btn">🔢 タップで入力する</button>
            <p id="mic-status" class="mic-status"></p>
        </div>

        <div class="feedback-area">
            <p id="recognized-text">ききとったこたえ: <span>-</span></p>
            <div id="result-mark" class="result-mark"></div>
        </div>
        
        <button id="next-btn" class="next-btn hidden">つぎの4もんへ</button>
        <button id="restart-btn" class="restart-btn hidden">さいしょから</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
